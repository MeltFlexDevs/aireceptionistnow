<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cdbef5"/>
      <stop offset="0.44" stop-color="#e4d6f2"/>
      <stop offset="1" stop-color="#ffd9c0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b3ef0"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- soft depth circles -->
  <circle cx="330" cy="250" r="150" fill="#ffffff" opacity="0.30" filter="url(#soft)"/>
  <circle cx="1300" cy="680" r="180" fill="#ffffff" opacity="0.25" filter="url(#soft)"/>

  <!-- glass panel -->
  <rect x="250" y="250" width="1100" height="400" rx="40" fill="#ffffff" opacity="0.45"/>
  <rect x="250.5" y="250.5" width="1099" height="399" rx="40" stroke="#ffffff" opacity="0.7"/>

  <!-- center baseline -->
  <line x1="330" y1="450" x2="1270" y2="450" stroke="#1a1a1a" stroke-opacity="0.08" stroke-width="2"/>

  <!-- equalizer waveform (organic, voice-like envelope) -->
  <g fill="url(#bar)">
    <rect x="330" y="436" width="16" height="28" rx="8"/>
    <rect x="372" y="414" width="16" height="72" rx="8"/>
    <rect x="414" y="386" width="16" height="128" rx="8"/>
    <rect x="456" y="346" width="16" height="208" rx="8"/>
    <rect x="498" y="300" width="16" height="300" rx="8"/>
    <rect x="540" y="356" width="16" height="188" rx="8"/>
    <rect x="582" y="408" width="16" height="84" rx="8"/>
    <rect x="624" y="376" width="16" height="148" rx="8"/>
    <rect x="666" y="330" width="16" height="240" rx="8"/>
    <rect x="708" y="284" width="16" height="332" rx="8"/>
    <rect x="750" y="320" width="16" height="260" rx="8"/>
    <rect x="792" y="372" width="16" height="156" rx="8"/>
    <rect x="834" y="420" width="16" height="60" rx="8"/>
    <rect x="876" y="392" width="16" height="116" rx="8"/>
    <rect x="918" y="344" width="16" height="212" rx="8"/>
    <rect x="960" y="296" width="16" height="308" rx="8"/>
    <rect x="1002" y="338" width="16" height="224" rx="8"/>
    <rect x="1044" y="386" width="16" height="128" rx="8"/>
    <rect x="1086" y="358" width="16" height="184" rx="8"/>
    <rect x="1128" y="404" width="16" height="92" rx="8"/>
    <rect x="1170" y="424" width="16" height="52" rx="8"/>
    <rect x="1212" y="410" width="16" height="80" rx="8"/>
    <rect x="1254" y="434" width="16" height="32" rx="8"/>
  </g>

  <!-- phone chip -->
  <g>
    <circle cx="800" cy="730" r="34" fill="#111111"/>
    <path d="M789 718c4 8 11 15 19 19l6-6c1-1 2-1 3-1 3 1 6 2 10 2 1 0 2 1 2 2v9c0 1-1 2-2 2-25 0-46-21-46-46 0-1 1-2 2-2h9c1 0 2 1 2 2 0 4 1 7 2 10 0 1 0 2-1 3l-6 6Z" fill="#ffffff"/>
