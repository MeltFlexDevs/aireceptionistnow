<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dental call flow: an incoming call is answered, then a new-patient exam is booked, recall or hygiene is scheduled, or an emergency is triaged and the on-call dentist is paged">
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- incoming call -->
  <g transform="translate(110 270)">
    <rect x="0" y="0" width="230" height="90" rx="10" fill="#fafafa" stroke="#e5e5e5" stroke-width="2"/>
    <circle cx="48" cy="45" r="20" fill="#1a1a1a"/>
    <path d="M 40 37 c -2 -2 -6 -1 -7 2 c -3 9 0 19 7 26 c 7 7 17 10 26 7 c 3 -1 4 -5 2 -7 l -6 -6 c -2 -2 -4 -2 -6 -1 l -3 2 c -4 -2 -7 -5 -9 -9 l 2 -3 c 1 -2 1 -4 -1 -6 z" fill="#ffffff"/>
    <text x="84" y="40" font-family="Inter, sans-serif" font-size="18" font-weight="500" fill="#1a1a1a">Patient call</text>
    <text x="84" y="64" font-family="Inter, sans-serif" font-size="14" font-weight="300" fill="#888">Lunch, after hours</text>
  </g>

  <!-- arrow -->
  <g stroke="#bbb" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 350 315 L 430 315"/>
    <path d="M 418 307 L 430 315 L 418 323"/>
  </g>

  <!-- AI answers -->
  <g transform="translate(440 255)">
    <rect x="0" y="0" width="220" height="120" rx="12" fill="#1a1a1a"/>
    <text x="110" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-size="19" font-weight="600" fill="#ffffff">AI answers</text>
    <text x="110" y="78" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="300" fill="rgba(255,255,255,0.6)">New or existing ·</text>
    <text x="110" y="96" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="300" fill="rgba(255,255,255,0.6)">reason for the visit</text>
  </g>

  <!-- branch arrows -->
  <g stroke="#bbb" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 660 290 C 720 290 730 165 800 165"/>
    <path d="M 788 157 L 800 165 L 788 173"/>
    <path d="M 660 315 L 800 315"/>
    <path d="M 788 307 L 800 315 L 788 323"/>
    <path d="M 660 340 C 720 340 730 465 800 465"/>
    <path d="M 788 457 L 800 465 L 788 473"/>
  </g>

  <!-- outcomes -->
  <g font-family="Inter, sans-serif">
    <g transform="translate(800 130)">
      <rect x="0" y="0" width="320" height="72" rx="10" fill="#fafafa" stroke="#e5e5e5" stroke-width="2"/>
      <text x="24" y="32" font-size="17" font-weight="500" fill="#1a1a1a">Books a new-patient exam</text>
      <text x="24" y="54" font-size="13" font-weight="300" fill="#888">Into your practice software</text>
    </g>
    <g transform="translate(800 279)">
      <rect x="0" y="0" width="320" height="72" rx="10" fill="#fafafa" stroke="#e5e5e5" stroke-width="2"/>
      <text x="24" y="32" font-size="17" font-weight="500" fill="#1a1a1a">Schedules recall or hygiene</text>
      <text x="24" y="54" font-size="13" font-weight="300" fill="#888">Reactivates lapsed patients</text>
    </g>
    <g transform="translate(800 428)">
      <rect x="0" y="0" width="320" height="72" rx="10" fill="#fafafa" stroke="#e5e5e5" stroke-width="2"/>
      <text x="24" y="32" font-size="17" font-weight="500" fill="#1a1a1a">Triages an emergency</text>
      <text x="24" y="54" font-size="13" font-weight="300" fill="#888">Pages the on-call dentist</text>
    </g>
  </g>
</svg>
