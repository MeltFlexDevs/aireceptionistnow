<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" role="img" aria-label="A dental practice phone line answered around the clock by an AI receptionist">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cdbef5"/>
      <stop offset="0.44" stop-color="#e4d6f2"/>
      <stop offset="1" stop-color="#ffd9c0"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- soft depth circles -->
  <circle cx="330" cy="250" r="150" fill="#ffffff" opacity="0.30" filter="url(#soft)"/>
  <circle cx="1300" cy="680" r="180" fill="#ffffff" opacity="0.25" filter="url(#soft)"/>

  <!-- glass panel -->
  <rect x="250" y="250" width="1100" height="400" rx="40" fill="#ffffff" opacity="0.45"/>
  <rect x="250.5" y="250.5" width="1099" height="399" rx="40" stroke="#ffffff" opacity="0.7"/>

  <!-- answered call: phone chip with signal arcs -->
  <g transform="translate(560 450)">
    <g stroke="#1a1a1a" stroke-opacity="0.35" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M 95 -70 A 110 110 0 0 1 95 70"/>
      <path d="M 135 -110 A 165 165 0 0 1 135 110"/>
    </g>
    <circle cx="0" cy="0" r="64" fill="#111111"/>
    <path d="M -20 -22 c -4 -4 -11 -2 -13 4 c -6 17 0 36 13 49 c 13 13 32 19 49 13 c 6 -2 8 -9 4 -13 l -11 -11 c -4 -4 -8 -4 -11 -2 l -6 4 c -7 -4 -13 -10 -17 -17 l 4 -6 c 2 -3 2 -7 -2 -11 z" fill="#ffffff"/>
  </g>

  <!-- tooth motif chip -->
  <g transform="translate(1010 450)">
    <rect x="-130" y="-130" width="260" height="260" rx="44" fill="#ffffff" opacity="0.55"/>
    <rect x="-129.5" y="-129.5" width="259" height="259" rx="44" stroke="#ffffff" opacity="0.8"/>
    <g transform="translate(0 -6) scale(1.15)">
      <path d="M -55 -35 C -58 -80 -30 -95 0 -78 C 30 -95 58 -80 55 -35 C 52 5 38 12 33 55 C 30 82 12 82 9 52 C 7 33 -7 33 -9 52 C -12 82 -30 82 -33 55 C -38 12 -52 5 -55 -35 Z" fill="#ffffff" stroke="#1a1a1a" stroke-width="6" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- 24/7 badge -->
  <g transform="translate(800 760)">
    <rect x="-92" y="-34" width="184" height="68" rx="34" fill="#111111"/>
    <text x="0" y="9" text-anchor="middle" font-size="30" font-weight="600" fill="#ffffff" letter-spacing="0.04em">24 / 7</text>
  </g>
</svg>
