<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <rect width="1200" height="630" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="1199" height="629" stroke="#eeeeee"/>

  <text x="60" y="64" font-size="15" font-weight="600" letter-spacing="1.5" fill="#9aa0b4">WHAT MAKES A VOICE FEEL HUMAN</text>

  <!-- Card 1: Prosody -->
  <rect x="60" y="92" width="525" height="222" rx="18" fill="#f7f8fc" stroke="#e1e3f4"/>
  <rect x="92" y="124" width="48" height="48" rx="12" fill="#ede9ff"/>
  <path d="M104 148c4-14 7-14 11 0s7 14 11 0" stroke="#7c5cff" stroke-width="3" stroke-linecap="round" fill="none"/>
  <text x="160" y="142" font-size="15" font-weight="600" letter-spacing="1" fill="#7c5cff">01</text>
  <text x="160" y="166" font-size="26" font-weight="600" fill="#111111">Prosody</text>
  <text x="92" y="216" font-size="17" fill="#555b6e">The melody, not the words — stress,</text>
  <text x="92" y="244" font-size="17" fill="#555b6e">breaths, the rise and fall of real speech.</text>
  <text x="92" y="284" font-size="14" fill="#9aa0b4">Mostly solved on premium neural voices.</text>

  <!-- Card 2: Speed -->
  <rect x="615" y="92" width="525" height="222" rx="18" fill="#f7f8fc" stroke="#e1e3f4"/>
  <rect x="647" y="124" width="48" height="48" rx="12" fill="#fff0e6"/>
  <path d="M673 132l-12 18h9l-3 14 12-18h-9l3-14Z" fill="#ff8a3d"/>
  <text x="715" y="142" font-size="15" font-weight="600" letter-spacing="1" fill="#ff8a3d">02</text>
  <text x="715" y="166" font-size="26" font-weight="600" fill="#111111">Response speed</text>
  <text x="647" y="216" font-size="17" fill="#555b6e">A reply in ~0.5–1s. A long pause before</text>
  <text x="647" y="244" font-size="17" fill="#555b6e">every answer is the most common tell.</text>
  <text x="647" y="284" font-size="14" fill="#9aa0b4">The single biggest deciding factor.</text>

  <!-- Card 3: Barge-in -->
  <rect x="60" y="338" width="525" height="222" rx="18" fill="#f7f8fc" stroke="#e1e3f4"/>
  <rect x="92" y="370" width="48" height="48" rx="12" fill="#ede9ff"/>
  <path d="M101 394h12m0 0l-5-5m5 5l-5 5M131 394h-12m0 0l5-5m-5 5l5 5" stroke="#7c5cff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="160" y="388" font-size="15" font-weight="600" letter-spacing="1" fill="#7c5cff">03</text>
  <text x="160" y="412" font-size="26" font-weight="600" fill="#111111">Barge-in</text>
  <text x="92" y="462" font-size="17" fill="#555b6e">It stops the instant you interrupt and</text>
  <text x="92" y="490" font-size="17" fill="#555b6e">listens — instead of talking over you.</text>
  <text x="92" y="530" font-size="14" fill="#9aa0b4">The fastest giveaway when it's missing.</text>

  <!-- Card 4: Backchannel -->
  <rect x="615" y="338" width="525" height="222" rx="18" fill="#f7f8fc" stroke="#e1e3f4"/>
  <rect x="647" y="370" width="48" height="48" rx="12" fill="#fff0e6"/>
  <circle cx="662" cy="394" r="3.5" fill="#ff8a3d"/>
  <circle cx="671" cy="394" r="3.5" fill="#ff8a3d"/>
  <circle cx="680" cy="394" r="3.5" fill="#ff8a3d"/>
  <text x="715" y="388" font-size="15" font-weight="600" letter-spacing="1" fill="#ff8a3d">04</text>
  <text x="715" y="412" font-size="26" font-weight="600" fill="#111111">Backchannel</text>
  <text x="647" y="462" font-size="17" fill="#555b6e">Little &#8220;mm-hm&#8221;s and &#8220;got it&#8221;s while you</text>
  <text x="647" y="490" font-size="17" fill="#555b6e">talk, so the caller feels heard.</text>
  <text x="647" y="530" font-size="14" fill="#9aa0b4">Silence then a perfect paragraph feels uncanny.</text>
</svg>
